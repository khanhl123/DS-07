services:
  - type: web
    name: ds07-weather-api
    runtime: python
    region: singapore
    plan: free
    rootDir: .
    buildCommand: pip install -r pipeline/api/requirements.txt
    startCommand: uvicorn pipeline.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
